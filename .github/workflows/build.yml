name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit lands. PR-only optimisation —
# main pushes are rare enough that we don't bother.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # `build` already runs spotlessCheck, lint, unit tests, and assembleRelease (which fires
      # lintVitalRelease). Keeping it as a single task means the same one-liner reproduces CI
      # locally — drift between local and CI was the original reason these checks rotted.
      - name: Build
        run: ./gradlew build
